# Deterministic, whole-dataset transforms applied ONCE before training (and replayed at
# inference using fitted state saved into the run dir). Distinct from per-batch augmentation.
# Each step is {name: <registry key>, ...params}. Order matters and is preserved.
defaults:
  - base_preprocessing

steps:
  # Remove simulations containing any NaN in the listed keys (failed forward simulations).
  - name: drop_nan
    keys: ${adapter.summary_variables}
  # Hold out a validation split (fit on train only; same split logic reused everywhere).
  - name: train_val_split
    validation_fraction: ${training.validation_fraction}
  # Per-feature z-score standardization. `fit` computes mean/std on the train split; the fitted
  # stats are saved to the run dir and reloaded by evaluate / evaluate_real.
  - name: standardize
    keys: ${adapter.summary_variables}
