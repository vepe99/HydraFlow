# Optuna multi-objective search (minimize RMSE and calibration error). The search space maps a
# config-path-like key to a sampling spec; the objective applies each suggestion onto a copy of
# the config before building the model. Add/remove entries freely.
defaults:
  - base_tuning

study_name: hydrabflow_study
storage_dir: ${data.data_dir}/tuning
n_trials: 50
directions: [minimize, minimize]
n_epochs: 10   # short budget per trial

# Save every trial's model + posterior + diagnostic plots, and the shared (fit-once) preprocessing
# state, under artifacts_dir. The Optuna study itself is stored in a concurrency-safe `.log`
# (JournalStorage) at ${storage_dir}/${study_name}.log so many processes can tune the same study
# at once. Set save_artifacts: false to keep only best_trials.json.
save_artifacts: true
artifacts_dir: ${tuning.storage_dir}/${tuning.study_name}
search_space:
  model.summary_network.summary_dim:
    type: int
    low: 16
    high: 64
  model.summary_network.num_heads:
    type: int
    low: 2
    high: 8
  model.summary_network.embed_dim:
    type: int
    low: 32
    high: 128
    step: 16
  model.inference_network.mlp_depth:
    type: int
    low: 2
    high: 8
  model.inference_network.mlp_width:
    type: int
    low: 32
    high: 256
    step: 16
  training.learning_rate:
    type: float
    low: 1e-4
    high: 1e-2
    log: true
