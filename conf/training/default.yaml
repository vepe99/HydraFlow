defaults:
  - base_training

n_epochs: 50
batch_size: 512
learning_rate: 1e-3
optimizer: adam
validation_fraction: 0.1
# Internal BayesFlow standardization (z-scores inference targets + summary outputs during fit).
# This is distinct from the preprocessing module, which standardizes the raw dataset on disk.
standardize:
  - inference_variables
  - summary_variables
verbose: 2
